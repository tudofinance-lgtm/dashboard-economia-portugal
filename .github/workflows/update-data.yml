name: Update Data Cache

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC (08:00 Lisboa hora de verão)
  workflow_dispatch:        # Manual trigger via GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data/cache.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch data from APIs
        run: python scripts/fetch_data.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update data cache $(date -u +%Y-%m-%d)"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
